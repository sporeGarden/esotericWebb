# SPDX-License-Identifier: AGPL-3.0-or-later
#
# Esoteric Webb — Capability Registry
#
# Source of truth for all JSON-RPC methods Webb exposes.
# This file is read by `capabilities.list` and validated by primalSpring.
#
# Stability tiers (Wave 20, per primalSpring registry standard):
#   stable   — wire name frozen; safe to hardcode in dispatch maps and gate TOMLs
#   evolving — may change with deprecation cycle; document dependency
#   internal — implementation detail; do not depend externally

[registry]
primal = "esotericwebb"
version = "0.1.0"
domain = "narrative"

# ── sourDough compliance (stable) ──

[health]
stability = "stable"

[[capabilities]]
method = "health.liveness"
description = "Kubernetes-style liveness probe — process is alive"

[[capabilities]]
method = "health.readiness"
description = "Kubernetes-style readiness probe — content loaded, session can start"

[[capabilities]]
method = "health.check"
description = "Health check (sourDough alias)"

[[capabilities]]
method = "health.version"
description = "Detailed version, build target, and signal tier information"

[[capabilities]]
method = "health.drain"
description = "Acknowledge graceful shutdown intent"

[identity]
stability = "stable"

[[capabilities]]
method = "identity.get"
description = "Self-identification — primal name, version, domain"

[capabilities_meta]
stability = "stable"

[[capabilities]]
method = "capabilities.list"
description = "Return canonical capability registry (Wave 20 envelope: capabilities, count, primal)"

# ── Lifecycle / Neural API (stable — Wave 17+) ──

[lifecycle]
stability = "stable"

[[capabilities]]
method = "primal.announce"
description = "Accept inbound primal registration announcements"

[[capabilities]]
method = "primal.info"
description = "Return niche metadata — version, capabilities, signal tiers"

# ── Webb domain methods (stable) ──

[webb]
stability = "stable"

[[capabilities]]
method = "webb.health"
description = "Webb-specific health check"

[[capabilities]]
method = "webb.liveness"
description = "Webb liveness check"

[[capabilities]]
method = "webb.readiness"
description = "Webb readiness check"

[[capabilities]]
method = "webb.scene.current"
description = "Current game scene description and metadata"

[[capabilities]]
method = "webb.narrative.status"
description = "Narrative DAG status — node count, edge count, start/end nodes"

[[capabilities]]
method = "webb.content.list"
description = "List loaded content (scenes, abilities, NPCs)"

# ── Session methods (stable) ──

[session]
stability = "stable"

[[capabilities]]
method = "session.start"
description = "Initialize a new game session with content bundle"
params = "{ content_path: string }"

[[capabilities]]
method = "session.state"
description = "Full game state snapshot — node, knowledge, inventory, flags, trust"

[[capabilities]]
method = "session.actions"
description = "List available actions from the current game state"

[[capabilities]]
method = "session.act"
description = "Perform a player action — returns outcome and narration context"
params = "{ kind: string, id: string }"

[[capabilities]]
method = "session.history"
description = "Full action history for the current session"

[[capabilities]]
method = "session.narrate"
description = "Narration context for AI-as-generator"

[[capabilities]]
method = "session.graph"
description = "Narrative DAG as DOT with live session overlay"

# ── MCP tools (evolving) ──

[tools]
stability = "evolving"

[[capabilities]]
method = "tools.list"
description = "MCP tool enumeration for AI agent discovery"

[[capabilities]]
method = "tools.call"
description = "MCP tool invocation for AI agent interaction"
params = "{ name: string, arguments: object }"
