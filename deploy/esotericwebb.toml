#
# Composition fragment for esotericWebb (narrative domain).
# All primal dependencies resolved from plasmidBin/ at deploy time, not
# from spring source trees. Webb uses primals like primalSpring does.

[node]
name = "esotericwebb"
domain = "narrative"
binary = "esotericwebb"
health_check = "webb.liveness"
dependencies = []
optional_dependencies = [
    "ludospring",
    "squirrel",
    "petaltongue",
    "rhizocrypt",
    "loamspine",
    "sweetgrass",
]

capabilities = [
    "webb.health",
    "webb.liveness",
    "webb.readiness",
    "webb.scene.current",
    "webb.narrative.status",
    "webb.content.list",
    "webb.content.validate",
    "tools.list",
    "tools.call",
]
