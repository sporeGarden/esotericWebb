#
# Composition fragment for esotericWebb (narrative domain).
# All primal dependencies resolved from plasmidBin/ at deploy time, not
# from spring source trees. Webb uses primals like primalSpring does.

[node]
name = "esotericwebb"
domain = "narrative"
binary = "esotericwebb"
health_check = "webb.liveness"
dependencies = []
optional_dependencies = [
    "squirrel",
    "petaltongue",
    "rhizocrypt",
    "loamspine",
    "sweetgrass",
    "nestgate",
    "toadstool",
    "songbird",
    "beardog",
]

capabilities = [
    "health.liveness",
    "health.readiness",
    "health.check",
    "identity.get",
    "capabilities.list",
    "webb.health",
    "webb.liveness",
    "webb.readiness",
    "webb.scene.current",
    "webb.narrative.status",
    "webb.content.list",
    "session.start",
    "session.state",
    "session.actions",
    "session.act",
    "session.history",
    "session.narrate",
    "session.graph",
    "tools.list",
    "tools.call",
]
