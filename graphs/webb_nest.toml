#
# Webb Nest Atomic — Tower + NestGate (persistence) + Webb
#
# Adds content-addressed storage for save/load game state,
# persistent content bundles, and model storage.
#
# Usage:
#   biomeos deploy --graph graphs/webb_nest.toml

[graph]
name = "webb_nest"
description = "Nest Atomic + Esoteric Webb (persistent CRPG)"
version = "0.1.1"
coordination = "sequential"
secure_by_default = true

[graph.metadata]
owner = "esotericwebb"
domain = "narrative"
wave = 46

# ── Phase 1: Tower Atomic ──

[[graph.node]]
name = "beardog"
binary = "beardog_primal"
order = 1
required = true
health_method = "health.liveness"
by_capability = "security"
capabilities = [
    "crypto.encrypt", "crypto.decrypt", "crypto.sign",
    "crypto.verify", "crypto.keygen", "crypto.identity",
]

[[graph.node]]
name = "songbird"
binary = "songbird_primal"
order = 2
required = true
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "discovery"
capabilities = [
    "discovery.find_primals", "discovery.announce",
    "network.tls_connect", "network.http_request",
]

# ── Phase 2: NestGate (persistence) ──

[[graph.node]]
name = "nestgate"
binary = "nestgate_primal"
order = 3
required = true
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "storage"
capabilities = [
    "storage.store", "storage.retrieve", "storage.list",
    "model.register", "model.locate",
]

# ── Phase 3: Esoteric Webb ──

[[graph.node]]
name = "esotericwebb"
binary = "esotericwebb"
order = 10
required = true
depends_on = ["beardog", "songbird", "nestgate"]
health_method = "health.liveness"
by_capability = "narrative"
capabilities = [
    "webb.health", "webb.liveness", "webb.readiness",
    "webb.scene.current", "webb.narrative.status", "webb.content.list",
    "session.start", "session.state", "session.actions",
    "session.act", "session.history", "session.narrate", "session.graph",
    "tools.list", "tools.call",
    "capabilities.list",
]

# ── Validation ──

[[graph.node]]
name = "validate_webb_nest"
binary = "primalspring_primal"
order = 99
required = false
spawn = false
depends_on = ["beardog", "songbird", "nestgate", "esotericwebb"]
health_method = "health.liveness"
by_capability = "coordination"
capabilities = ["composition.webb_nest_health"]
