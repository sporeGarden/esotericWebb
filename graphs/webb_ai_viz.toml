# SPDX-License-Identifier: AGPL-3.0-or-later
#
# Webb AI + Viz Overlay — Tower + Squirrel + PetalTongue + Webb
#
# AI-narrated, visually rendered CRPG. Squirrel provides MCP tool
# routing and LLM-powered narration; PetalTongue renders scenes
# and player dashboards.
#
# Usage:
#   biomeos deploy --graph graphs/webb_ai_viz.toml

[graph]
name = "webb_ai_viz"
description = "Tower + Squirrel + PetalTongue + Esoteric Webb (AI-narrated visual CRPG)"
version = "0.1.0"
coordination = "sequential"

# ── Phase 1: Tower Atomic ──

[[graph.node]]
name = "beardog"
binary = "beardog_primal"
order = 1
required = true
health_method = "health.liveness"
by_capability = "security"
capabilities = [
    "crypto.encrypt", "crypto.decrypt", "crypto.sign",
    "crypto.verify", "crypto.keygen", "crypto.identity",
]

[[graph.node]]
name = "songbird"
binary = "songbird_primal"
order = 2
required = true
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "discovery"
capabilities = [
    "discovery.find_primals", "discovery.announce",
    "network.tls_connect", "network.http_request",
]

# ── Phase 2: AI + Visualization Overlays ──

[[graph.node]]
name = "squirrel"
binary = "squirrel_primal"
order = 3
required = false
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "ai"
capabilities = [
    "ai.query", "ai.suggest", "ai.analyze",
    "tool.list", "tool.execute",
    "context.create", "context.update", "context.summarize",
    "capability.discover",
]

[[graph.node]]
name = "petaltongue"
binary = "petaltongue_primal"
order = 4
required = false
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "visualization"
capabilities = [
    "viz.render", "viz.dashboard",
    "viz.stream", "viz.query",
]

# ── Phase 3: Esoteric Webb ──

[[graph.node]]
name = "esotericwebb"
binary = "esotericwebb"
order = 10
required = true
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "game"
capabilities = [
    "webb.health", "webb.liveness", "webb.readiness",
    "webb.scene.current", "webb.narrative.status", "webb.content.list",
    "session.start", "session.state", "session.actions",
    "session.act", "session.history", "session.narrate", "session.graph",
    "tools.list", "tools.call",
    "capabilities.list",
]

# ── Validation ──

[[graph.node]]
name = "validate_webb_ai_viz"
binary = "primalspring_primal"
order = 99
required = false
spawn = false
depends_on = ["beardog", "songbird", "squirrel", "petaltongue", "esotericwebb"]
health_method = "health.liveness"
by_capability = "coordination"
capabilities = ["composition.webb_ai_viz_health"]
