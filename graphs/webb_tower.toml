#
# Webb Tower Atomic — minimum viable CRPG composition
#
# BearDog (security) + Songbird (discovery) + Esoteric Webb (game).
# Webb runs as a standalone text CRPG with encrypted IPC and
# capability-based discovery. No AI, compute, or persistence primals.
#
# Usage:
#   biomeos deploy --graph graphs/webb_tower.toml

[graph]
name = "webb_tower"
description = "Tower Atomic + Esoteric Webb (standalone text CRPG)"
version = "0.1.0"
coordination = "sequential"

# ── Phase 1: Tower Atomic ──

[[graph.node]]
name = "beardog"
binary = "beardog_primal"
order = 1
required = true
health_method = "health.liveness"
by_capability = "security"
capabilities = [
    "crypto.encrypt", "crypto.decrypt", "crypto.sign",
    "crypto.verify", "crypto.keygen", "crypto.identity",
]

[[graph.node]]
name = "songbird"
binary = "songbird_primal"
order = 2
required = true
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "discovery"
capabilities = [
    "discovery.find_primals", "discovery.announce",
    "network.tls_connect", "network.http_request",
]

# ── Phase 2: Esoteric Webb ──

[[graph.node]]
name = "esotericwebb"
binary = "esotericwebb"
order = 10
required = true
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "game"
capabilities = [
    "webb.health", "webb.liveness", "webb.readiness",
    "webb.scene.current", "webb.narrative.status", "webb.content.list",
    "session.start", "session.state", "session.actions",
    "session.act", "session.history", "session.narrate", "session.graph",
    "tools.list", "tools.call",
    "capabilities.list",
]

# ── Validation ──

[[graph.node]]
name = "validate_webb_tower"
binary = "primalspring_primal"
order = 99
required = false
spawn = false
depends_on = ["beardog", "songbird", "esotericwebb"]
health_method = "health.liveness"
by_capability = "coordination"
capabilities = ["composition.webb_tower_health"]
