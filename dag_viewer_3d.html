<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Esoteric Webb — 3D Narrative DAG</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #c9d1d9;
    --accent: #58a6ff;
    --green: #50fa7b;
    --pink: #ff79c6;
    --orange: #ffb86c;
    --muted: #8b949e;
    --red: #ff5555;
    --purple: #bd93f9;
    --cyan: #8be9fd;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 0.8rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 1.2rem;
    z-index: 10;
    flex-shrink: 0;
  }
  header h1 { font-size: 1.1rem; font-weight: 600; color: var(--accent); }
  .tabs { display: flex; gap: 0.4rem; margin-left: auto; }
  .tab {
    padding: 0.35rem 0.9rem;
    border-radius: 5px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    cursor: pointer;
    font-size: 0.8rem;
    font-weight: 500;
    transition: all 0.15s;
    user-select: none;
  }
  .tab:hover { border-color: var(--accent); color: var(--text); }
  .tab.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }

  #info-panel {
    position: absolute;
    top: 56px; left: 12px;
    background: rgba(22,27,34,0.92);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1rem;
    z-index: 10;
    min-width: 220px;
    backdrop-filter: blur(8px);
    font-size: 0.82rem;
    line-height: 1.6;
  }
  #info-panel h3 { color: var(--accent); font-size: 0.9rem; margin-bottom: 0.4rem; }
  #info-panel .stat { color: var(--orange); font-weight: 600; }
  #info-panel .dim { color: var(--muted); }

  #legend-panel {
    position: absolute;
    bottom: 12px; left: 12px;
    background: rgba(22,27,34,0.92);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.8rem 1rem;
    z-index: 10;
    backdrop-filter: blur(8px);
    font-size: 0.75rem;
    line-height: 1.8;
  }
  #legend-panel .row { display: flex; align-items: center; gap: 6px; }
  #legend-panel .swatch {
    display: inline-block; width: 10px; height: 10px; border-radius: 2px;
  }
  .edge-legend { display: flex; align-items: center; gap: 4px; margin-top: 4px; }
  .edge-legend .line {
    display: inline-block; width: 24px; height: 2px;
  }

  #depth-ruler {
    position: absolute;
    bottom: 12px; right: 12px;
    background: rgba(22,27,34,0.92);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.6rem 1rem;
    z-index: 10;
    backdrop-filter: blur(8px);
    font-size: 0.72rem;
    color: var(--muted);
    text-align: center;
  }
  #depth-ruler .depth-bar {
    display: flex; gap: 2px; margin-top: 4px; align-items: center;
  }
  #depth-ruler .depth-cell {
    width: 32px; height: 8px; border-radius: 2px; text-align: center;
    font-size: 0.65rem; line-height: 8px;
  }
  #depth-ruler .depth-label {
    font-size: 0.65rem; color: var(--text); margin-top: 2px;
  }

  #hover-label {
    position: absolute;
    top: 56px; right: 12px;
    background: rgba(22,27,34,0.95);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.6rem 0.8rem;
    z-index: 10;
    font-size: 0.8rem;
    display: none;
    max-width: 280px;
  }
  #hover-label .node-name { color: var(--accent); font-weight: 600; font-size: 0.95rem; }
  #hover-label .node-type { color: var(--muted); font-size: 0.75rem; }

  #graph-container { flex: 1; position: relative; }
</style>
</head>
<body>
<header>
  <h1>Esoteric Webb</h1>
  <span style="color:var(--muted); font-size:0.8rem">3D Narrative DAG</span>
  <div class="tabs">
    <div class="tab active" data-view="narrative">Full Narrative</div>
    <div class="tab" data-view="played">Played Session</div>
    <div class="tab" data-view="live">Live Snapshot</div>
  </div>
</header>

<div id="graph-container"></div>

<div id="info-panel">
  <h3 id="view-title">Full Narrative</h3>
  <div id="view-desc"></div>
</div>

<div id="legend-panel">
  <div class="row"><span class="swatch" style="background:#58a6ff"></span> neutral room</div>
  <div class="row"><span class="swatch" style="background:#50fa7b"></span> visited</div>
  <div class="row"><span class="swatch" style="background:#ff79c6"></span> current position</div>
  <div class="row"><span class="swatch" style="background:#ffb86c"></span> available exit</div>
  <div class="row"><span class="swatch" style="background:#444466"></span> unexplored</div>
  <div class="row"><span class="swatch" style="background:#bd93f9; border-radius:50%"></span> ending</div>
  <div style="margin-top:6px; border-top:1px solid #30363d; padding-top:4px;">
    <div class="edge-legend"><span class="line" style="background:#50fa7b"></span> forward (deeper)</div>
    <div class="edge-legend"><span class="line" style="background:#ff5555; opacity:0.5"></span> back (return/cycle)</div>
    <div class="edge-legend"><span class="line" style="background:#8be9fd; opacity:0.6"></span> lateral (same depth)</div>
  </div>
</div>

<div id="depth-ruler">
  journey depth
  <div class="depth-bar" id="depth-bar"></div>
</div>

<div id="hover-label">
  <div class="node-name" id="hover-name"></div>
  <div class="node-type" id="hover-type"></div>
  <div id="hover-detail" style="margin-top:4px; font-size:0.75rem; color:#c9d1d9"></div>
</div>

<script src="https://unpkg.com/three@0.164.1/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.164.1/examples/js/renderers/CSS2DRenderer.js"></script>
<script src="https://unpkg.com/3d-force-graph@1.73.4/dist/3d-force-graph.min.js"></script>

const GRAPHS = {
  narrative: {"edges":[{"available":false,"edge_type":"forward","gated":false,"label":"Enter the parlor","source":"entrance","taken":false,"target":"parlor"},{"available":false,"edge_type":"forward","gated":false,"label":"Go to the study","source":"entrance","taken":false,"target":"study"},{"available":false,"edge_type":"back","gated":false,"label":"Return to study","source":"library","taken":false,"target":"study"},{"available":false,"edge_type":"forward","gated":false,"label":"Enter the ritual chamber","source":"library","taken":false,"target":"ritual_chamber"},{"available":false,"edge_type":"back","gated":false,"label":"Return to entrance","source":"study","taken":false,"target":"entrance"},{"available":false,"edge_type":"lateral","gated":false,"label":"Go to the parlor","source":"study","taken":false,"target":"parlor"},{"available":false,"edge_type":"forward","gated":false,"label":"Find the hidden passage","source":"study","taken":false,"target":"library"},{"available":false,"edge_type":"back","gated":false,"label":"Return to library","source":"ritual_chamber","taken":false,"target":"library"},{"available":false,"edge_type":"forward","gated":false,"label":"Pursue justice","source":"ritual_chamber","taken":false,"target":"ending_justice"},{"available":false,"edge_type":"forward","gated":false,"label":"Show mercy","source":"ritual_chamber","taken":false,"target":"ending_mercy"},{"available":false,"edge_type":"forward","gated":false,"label":"Accept the deal","source":"ritual_chamber","taken":false,"target":"ending_complicity"},{"available":false,"edge_type":"forward","gated":false,"label":"Speak the true name","source":"ritual_chamber","taken":false,"target":"ending_transcendence"},{"available":false,"edge_type":"back","gated":false,"label":"Return to parlor","source":"backroom","taken":false,"target":"parlor"},{"available":false,"edge_type":"forward","gated":false,"label":"Unlock the vault","source":"backroom","taken":false,"target":"vault"},{"available":false,"edge_type":"back","gated":false,"label":"Return to entrance","source":"parlor","taken":false,"target":"entrance"},{"available":false,"edge_type":"forward","gated":false,"label":"Slip into the backroom","source":"parlor","taken":false,"target":"backroom"},{"available":false,"edge_type":"lateral","gated":false,"label":"Head to the study","source":"parlor","taken":false,"target":"study"},{"available":false,"edge_type":"back","gated":false,"label":"Return to backroom","source":"vault","taken":false,"target":"backroom"}],"max_depth":4,"nodes":[{"depth":0,"id":"entrance","is_ending":false,"is_start":true,"label":"entrance","scene_type":"exploration","status":"neutral"},{"depth":2,"id":"library","is_ending":false,"is_start":false,"label":"library","scene_type":"investigation","status":"neutral"},{"depth":4,"id":"ending_mercy","is_ending":true,"is_start":false,"label":"Mercy","scene_type":"ending","status":"neutral"},{"depth":1,"id":"study","is_ending":false,"is_start":false,"label":"study","scene_type":"investigation","status":"neutral"},{"depth":3,"id":"ritual_chamber","is_ending":false,"is_start":false,"label":"ritual_chamber","scene_type":"dialogue","status":"neutral"},{"depth":4,"id":"ending_complicity","is_ending":true,"is_start":false,"label":"Complicity","scene_type":"ending","status":"neutral"},{"depth":4,"id":"ending_justice","is_ending":true,"is_start":false,"label":"Justice","scene_type":"ending","status":"neutral"},{"depth":4,"id":"ending_transcendence","is_ending":true,"is_start":false,"label":"Transcendence","scene_type":"ending","status":"neutral"},{"depth":2,"id":"backroom","is_ending":false,"is_start":false,"label":"backroom","scene_type":"exploration","status":"neutral"},{"depth":1,"id":"parlor","is_ending":false,"is_start":false,"label":"parlor","scene_type":"dialogue","status":"neutral"},{"depth":3,"id":"vault","is_ending":false,"is_start":false,"label":"vault","scene_type":"investigation","status":"neutral"}]},

"label":"Enter the ritual chamber","source":"library","taken":true,"target":"ritual_chamber"},{"available":true,"edge_type":"back","gated":false,"label":"Return to entrance","source":"parlor","taken":false,"target":"entrance"},{"available":false,"edge_type":"forward","gated":false,"label":"Slip into the backroom","source":"parlor","taken":true,"target":"backroom"},{"available":false,"edge_type":"lateral","gated":false,"label":"Head to the study","source":"parlor","taken":true,"target":"study"}],"max_depth":4,"nodes":[{"depth":2,"id":"backroom","is_ending":false,"is_start":false,"label":"backroom","scene_type":"exploration","status":"visited"},{"depth":3,"id":"vault","is_ending":false,"is_start":false,"label":"vault","scene_type":"investigation","status":"unexplored"},{"depth":4,"id":"ending_justice","is_ending":true,"is_start":false,"label":"Justice","scene_type":"ending","status":"unexplored"},{"depth":3,"id":"ritual_chamber","is_ending":false,"is_start":false,"label":"ritual_chamber","scene_type":"dialogue","status":"visited"},{"depth":4,"id":"ending_transcendence","is_ending":true,"is_start":false,"label":"Transcendence","scene_type":"ending","status":"unexplored"},{"depth":0,"id":"entrance","is_ending":false,"is_start":true,"label":"entrance","scene_type":"exploration","status":"visited"},{"depth":4,"id":"ending_mercy","is_ending":true,"is_start":false,"label":"Mercy","scene_type":"ending","status":"current"},{"depth":1,"id":"study","is_ending":false,"is_start":false,"label":"study","scene_type":"investigation","status":"visited"},{"depth":2,"id":"library","is_ending":false,"is_start":false,"label":"library","scene_type":"investigation","status":"visited"},{"depth":4,"id":"ending_complicity","is_ending":true,"is_start":false,"label":"Complicity","scene_type":"ending","status":"unexplored"},{"depth":1,"id":"parlor","is_ending":false,"is_start":false,"label":"parlor","scene_type":"dialogue","status":"visited"}]},

  live: {"edges":[{"available":false,"edge_type":"back","gated":false,"label":"Return to study","source":"library","taken":false,"target":"study"},{"available":false,"edge_type":"forward","gated":false,"label":"Enter the ritual chamber","source":"library","taken":false,"target":"ritual_chamber"},{"available":false,"edge_type":"back","gated":false,"label":"Return to entrance","source":"parlor","taken":false,"target":"entrance"},{"available":false,"edge_type":"forward","gated":false,"label":"Slip into the backroom","source":"parlor","taken":false,"target":"backroom"},{"available":false,"edge_type":"lateral","gated":false,"label":"Head to the study","source":"parlor","taken":false,"target":"study"},{"available":true,"edge_type":"forward","gated":false,"label":"Enter the parlor","source":"entrance","taken":false,"target":"parlor"},{"available":true,"edge_type":"forward","gated":false,"label":"Go to the study","source":"entrance","taken":false,"target":"study"},{"available":false,"edge_type":"back","gated":false,"label":"Return to backroom","source":"vault","taken":false,"target":"backroom"},{"available":false,"edge_type":"back","gated":false,"label":"Return to library","source":"ritual_chamber","taken":false,"target":"library"},{"available":false,"edge_type":"forward","gated":false,"label":"Pursue justice","source":"ritual_chamber","taken":false,"target":"ending_justice"},{"available":false,"edge_type":"forward","gated":false,"label":"Show mercy","source":"ritual_chamber","taken":false,"target":"ending_mercy"},{"available":false,"edge_type":"forward","gated":false,"label":"Accept the deal","source":"ritual_chamber","taken":false,"target":"ending_complicity"},{"available":false,"edge_type":"forward","gated":false,"label":"Speak the true name","source":"ritual_chamber","taken":false,"target":"ending_transcendence"},{"available":false,"edge_type":"back","gated":false,"label":"Return to entrance","source":"study","taken":false,"target":"entrance"},{"available":false,"edge_type":"lateral","gated":false,"label":"Go to the parlor","source":"study","taken":false,"target":"parlor"},{"available":false,"edge_type":"forward","gated":false,"label":"Find the hidden passage","source":"study","taken":false,"target":"library"},{"available":false,"edge_type":"back","gated":false,"label":"Return to parlor","source":"backroom","taken":false,"target":"parlor"},{"available":false,"edge_type":"forward","gated":false,"label":"Unlock the vault","source":"backroom","taken":false,"target":"vault"}],"max_depth":4,"nodes":[{"depth":4,"id":"ending_complicity","is_ending":true,"is_start":false,"label":"Complicity","scene_type":"ending","status":"unexplored"},{"depth":2,"id":"library","is_ending":false,"is_start":false,"label":"library","scene_type":"investigation","status":"unexplored"},{"depth":1,"id":"parlor","is_ending":false,"is_start":false,"label":"parlor","scene_type":"dialogue","status":"available"},{"depth":4,"id":"ending_transcendence","is_ending":true,"is_start":false,"label":"Transcendence","scene_type":"ending","status":"unexplored"},{"depth":0,"id":"entrance","is_ending":false,"is_start":true,"label":"entrance","scene_type":"exploration","status":"current"},{"depth":3,"id":"vault","is_ending":false,"is_start":false,"label":"vault","scene_type":"investigation","status":"unexplored"},{"depth":3,"id":"ritual_chamber","is_ending":false,"is_start":false,"label":"ritual_chamber","scene_type":"dialogue","status":"unexplored"},{"depth":4,"id":"ending_mercy","is_ending":true,"is_start":false,"label":"Mercy","scene_type":"ending","status":"unexplored"},{"depth":1,"id":"study","is_ending":false,"is_start":false,"label":"study","scene_type":"investigation","status":"available"},{"depth":2,"id":"backroom","is_ending":false,"is_start":false,"label":"backroom","scene_type":"exploration","status":"unexplored"},{"depth":4,"id":"ending_justice","is_ending":true,"is_start":false,"label":"Justice","scene_type":"ending","status":"unexplored"}]}
};

const VIEW_INFO = {
  narrative: {
    title: 'Full Narrative',
    desc: 'The complete possibility space. 5 depth layers from entrance to endings. Back-edges (red) show cycles — the return paths that make this a cyclic digraph, not a true DAG.'
  },
  played: {
    title: 'Played Session',
    desc: '38-turn autoplay reached Mercy. Green path traces the journey forward through 5 layers. Notice: vault branch and 3 endings were never reached — the unexplored grey volume.'
  },
  live: {
    title: 'Live Snapshot',
    desc: 'Standing at the entrance. Only parlor and study (depth 1) glow orange as reachable. The 4 endings at depth 4 are far away — 4 forward hops through unknown territory.'
  },
};

const DEPTH_COLORS = ['#58a6ff', '#8be9fd', '#50fa7b', '#ffb86c', '#bd93f9'];
const STATUS_COLORS = {
  neutral:    '#58a6ff',
  visited:    '#50fa7b',
  current:    '#ff79c6',
  available:  '#ffb86c',
  unexplored: '#444466',
};
const EDGE_COLORS = {
  forward: '#50fa7b',
  back:    '#ff5555',
  lateral: '#8be9fd',
};

const LAYER_SPACING = 120;
const Y_SPACING = 80;
const Z_SPREAD = 40;

function layoutNodes(data) {
  const byDepth = {};
  data.nodes.forEach(n => {
    if (!byDepth[n.depth]) byDepth[n.depth] = [];
    byDepth[n.depth].push(n);
  });

  Object.entries(byDepth).forEach(([depth, nodes]) => {
    const d = parseInt(depth);
    const count = nodes.length;
    nodes.forEach((n, i) => {
      n.fx = d * LAYER_SPACING;
      const yOffset = (i - (count - 1) / 2) * Y_SPACING;
      n.fy = yOffset;
      n.fz = (i % 2 === 0 ? 1 : -1) * Z_SPREAD * (d > 0 ? 0.5 : 0);
    });
  });
}

function buildGraphData(data) {
  layoutNodes(data);

  const nodeMap = {};
  data.nodes.forEach(n => { nodeMap[n.id] = n; });

  const links = data.edges.map(e => ({
    source: e.source,
    target: e.target,
    label: e.label,
    edge_type: e.edge_type,
    taken: e.taken,
    available: e.available,
    gated: e.gated,
  }));

  return { nodes: data.nodes, links };
}

let graph = null;
let currentView = 'narrative';

function nodeColor(node) {
  if (currentView === 'narrative') {
    if (node.is_ending) return '#bd93f9';
    if (node.is_start)  return '#ff79c6';
    return DEPTH_COLORS[node.depth] || '#58a6ff';
  }
  return STATUS_COLORS[node.status] || '#444466';
}

function nodeSize(node) {
  if (node.is_start || node.status === 'current') return 8;
  if (node.is_ending) return 7;
  if (node.status === 'visited') return 6;
  if (node.status === 'available') return 5;
  return 4;
}

function edgeColor(link) {
  if (link.taken) return '#50fa7b';
  if (link.available) return '#ffb86c';
  if (link.gated) return '#6272a4';
  if (currentView === 'narrative') return EDGE_COLORS[link.edge_type] || '#444466';
  return '#333344';
}

function edgeWidth(link) {
  if (link.taken) return 2.5;
  if (link.available) return 1.2;
  if (link.edge_type === 'back') return 0.4;
  return 0.8;
}

function edgeOpacity(link) {
  if (link.taken) return 1.0;
  if (link.available) return 0.7;
  if (currentView !== 'narrative' && !link.taken && !link.available) return 0.15;
  if (link.edge_type === 'back') return 0.35;
  return 0.6;
}

function edgeCurvature(link) {
  if (link.edge_type === 'back') return 0.4;
  if (link.edge_type === 'lateral') return 0.25;
  return 0;
}

function render(view) {
  currentView = view;
  const data = GRAPHS[view];
  const graphData = buildGraphData(JSON.parse(JSON.stringify(data)));

  document.getElementById('view-title').textContent = VIEW_INFO[view].title;
  document.getElementById('view-desc').innerHTML = VIEW_INFO[view].desc;

  const container = document.getElementById('graph-container');

  if (graph) {
    graph.graphData(graphData);
    graph.nodeColor(nodeColor);
    graph.linkColor(edgeColor);
    graph.linkWidth(edgeWidth);
    graph.linkOpacity(edgeOpacity);
    graph.linkCurvature(edgeCurvature);
  } else {
    graph = ForceGraph3D()(container)
      .graphData(graphData)
      .backgroundColor('#0d1117')
      .nodeLabel(n => '')
      .nodeColor(nodeColor)
      .nodeVal(n => nodeSize(n) ** 2)
      .nodeOpacity(0.92)
      .nodeResolution(16)
      .linkColor(edgeColor)
      .linkWidth(edgeWidth)
      .linkOpacity(edgeOpacity)
      .linkCurvature(edgeCurvature)
      .linkDirectionalArrowLength(4)
      .linkDirectionalArrowRelPos(1)
      .linkDirectionalArrowColor(edgeColor)
      .linkDirectionalParticles(l => l.taken ? 3 : (l.available ? 1 : 0))
      .linkDirectionalParticleWidth(l => l.taken ? 2 : 1)
      .linkDirectionalParticleColor(l => l.taken ? '#50fa7b' : '#ffb86c')
      .linkDirectionalParticleSpeed(0.005)
      .d3AlphaDecay(0.1)
      .d3VelocityDecay(0.5)
      .warmupTicks(50)
      .cooldownTicks(0)
      .onNodeHover(onNodeHover)
      .nodeThreeObject(node => {
        const group = new THREE.Group();

        const geo = node.is_ending
          ? new THREE.OctahedronGeometry(nodeSize(node) * 0.7, 1)
          : node.is_start
            ? new THREE.BoxGeometry(nodeSize(node), nodeSize(node), nodeSize(node))
            : new THREE.SphereGeometry(nodeSize(node) * 0.5, 16, 12);

        const mat = new THREE.MeshLambertMaterial({
          color: nodeColor(node),
          transparent: true,
          opacity: node.status === 'unexplored' && currentView !== 'narrative' ? 0.3 : 0.9,
        });
        const mesh = new THREE.Mesh(geo, mat);
        group.add(mesh);

        if (node.status === 'current' || node.is_start) {
          const ringGeo = new THREE.TorusGeometry(nodeSize(node) * 0.9, 0.5, 8, 32);
          const ringMat = new THREE.MeshBasicMaterial({
            color: node.status === 'current' ? '#ff79c6' : '#58a6ff',
            transparent: true, opacity: 0.6
          });
          group.add(new THREE.Mesh(ringGeo, ringMat));
        }

        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        const text = node.label;
        const fontSize = 28;
        ctx.font = `bold ${fontSize}px Helvetica`;
        const textWidth = ctx.measureText(text).width;
        canvas.width = textWidth + 20;
        canvas.height = fontSize + 10;
        ctx.font = `bold ${fontSize}px Helvetica`;
        ctx.fillStyle = nodeColor(node);
        ctx.textBaseline = 'top';
        ctx.fillText(text, 10, 5);

        const texture = new THREE.CanvasTexture(canvas);
        const spriteMat = new THREE.SpriteMaterial({ map: texture, transparent: true, opacity: 0.85 });
        const sprite = new THREE.Sprite(spriteMat);
        const scale = canvas.width / canvas.height;
        sprite.scale.set(scale * 6, 6, 1);
        sprite.position.set(0, nodeSize(node) + 5, 0);
        group.add(sprite);

        return group;
      });

    const maxD = data.max_depth;
    const centerX = (maxD * LAYER_SPACING) / 2;
    graph.cameraPosition({ x: centerX, y: 0, z: maxD * LAYER_SPACING * 0.8 },
                         { x: centerX, y: 0, z: 0 }, 0);
  }

  buildDepthRuler(data);
}

function onNodeHover(node) {
  const el = document.getElementById('hover-label');
  if (!node) { el.style.display = 'none'; return; }
  el.style.display = 'block';
  document.getElementById('hover-name').textContent = node.label;
  document.getElementById('hover-type').textContent =
    `${node.scene_type} | depth ${node.depth} | ${node.status}`;

  const data = GRAPHS[currentView];
  const exits = data.edges.filter(e => e.source === node.id);
  const entries = data.edges.filter(e => e.target === node.id);
  let detail = '';
  if (exits.length > 0) {
    detail += `<b>Exits:</b> ${exits.map(e => {
      const icon = e.edge_type === 'forward' ? '→' : e.edge_type === 'back' ? '↩' : '↔';
      const style = e.taken ? 'color:#50fa7b' : e.available ? 'color:#ffb86c' : 'color:#666';
      return `<span style="${style}">${icon} ${e.label || e.target}</span>`;
    }).join(', ')}`;
  }
  document.getElementById('hover-detail').innerHTML = detail;
}

function buildDepthRuler(data) {
  const bar = document.getElementById('depth-bar');
  bar.innerHTML = '';
  const labels = ['entrance', 'rooms', 'rooms', 'chambers', 'endings'];
  for (let d = 0; d <= data.max_depth; d++) {
    const cell = document.createElement('div');
    cell.style.display = 'flex';
    cell.style.flexDirection = 'column';
    cell.style.alignItems = 'center';
    cell.style.marginRight = '8px';

    const swatch = document.createElement('div');
    swatch.className = 'depth-cell';
    swatch.style.background = DEPTH_COLORS[d] || '#58a6ff';
    cell.appendChild(swatch);

    const label = document.createElement('div');
    label.className = 'depth-label';
    label.textContent = `${d}: ${labels[d] || ''}`;
    cell.appendChild(label);

    bar.appendChild(cell);

    if (d < data.max_depth) {
      const arrow = document.createElement('span');
      arrow.textContent = '→';
      arrow.style.color = '#444466';
      arrow.style.marginRight = '8px';
      arrow.style.fontSize = '0.7rem';
      bar.appendChild(arrow);
    }
  }
}

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    render(tab.dataset.view);
  });
});

render('narrative');
</script>
